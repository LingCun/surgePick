name: Initial data ingest (manual)

# 1회성 전체 적재: tickers → 5년 가격 backfill → regime → 자동완성 인덱스.
# Turso·Yahoo 가 모두 열린 Actions 러너에서 실행. GitHub Actions 탭 → Run workflow 로 수동 트리거.
on:
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Seed tickers
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run ingest:tickers

      - name: Backfill 5y prices (~15 min)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=2048
        run: npm run backfill:prices

      - name: Ingest today's regime
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run scan:regime && npm run ingest:regime

      - name: Rebuild autocomplete index
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run build:index

      - name: Commit refreshed index + data (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/tickers-index.json src/data/regime.json
          if git diff --cached --quiet; then
            echo "No file changes to commit (DB updated in place)."
          else
            git commit -m "data: refresh tickers index + regime from ingest"
            git push
          fi
