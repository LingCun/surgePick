name: Daily data scan

on:
  schedule:
    # KR: 18:30 KST = UTC 09:30 (시간외 단일가 18:00 종료 + 30분 버퍼)
    - cron: '30 9 * * 1-5'
    # US: 10:30 KST = UTC 01:30 (after-hours 종료 EDT 09:00 / EST 10:00 KST + 버퍼)
    # KST 화~토 = US 정규장 월~금. UTC 요일도 화~토 (01:30 UTC = 10:30 KST 같은 날).
    - cron: '30 1 * * 2-6'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Determine market from cron
        id: which
        run: |
          case "${{ github.event.schedule }}" in
            "30 9 * * 1-5")  echo "MARKET=kr"  >> $GITHUB_OUTPUT ;;
            "30 1 * * 2-6")  echo "MARKET=us"  >> $GITHUB_OUTPUT ;;
            *)               echo "MARKET=all" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run scan + ingest
        run: npm run scan
        env:
          MARKET: ${{ steps.which.outputs.MARKET }}
          NODE_OPTIONS: --max-old-space-size=2048
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Commit data changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            STAMP=$(date -u +%Y-%m-%d_%H%MZ)
            git commit -m "data: scheduled scan ${STAMP}"
            git push
          fi
